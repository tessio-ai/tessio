name: tessio-aio

# The all-in-one app container + its two datastores. Simplest Tessio: one app
# container (api+worker+runner+web+migrations) talking to Postgres + Redis.
#
# Datastores are gated behind the "bundled" Compose profile:
#   • Bundled (default):  set COMPOSE_PROFILES=bundled in .env — runs Postgres +
#                         Redis containers alongside the app.
#   • Managed/external:   leave COMPOSE_PROFILES unset and point DATABASE_URL /
#                         REDIS_URL at your own datastores — the two containers
#                         below stay dormant (app.depends_on is required:false).
# The `curl … | sh` installer (install.sh) sets this up for you either way.
#
# Images publish to ghcr.io/tessio-ai/tessio-aio; add `--build` to build locally.

services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ['bundled']
    restart: unless-stopped
    environment:
      POSTGRES_USER: tessio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tessio}
      POSTGRES_DB: tessio
    volumes:
      - tessio_aio_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tessio']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    profiles: ['bundled']
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-}']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/tessio-ai/tessio-aio:${TESSIO_VERSION:-latest}
    build:
      context: .
      target: aio
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://tessio:tessio@postgres:5432/tessio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SESSION_SECRET: ${SESSION_SECRET}
      TESSIO_SECRET_KEY: ${TESSIO_SECRET_KEY}
      # Worker + runner share this container; the token locks the internal /run endpoint.
      RUNNER_TOKEN: ${RUNNER_TOKEN:-}
      TESSIO_ADMIN_EMAIL: ${TESSIO_ADMIN_EMAIL:-}
      TESSIO_ADMIN_PASSWORD: ${TESSIO_ADMIN_PASSWORD:-}
      TESSIO_ADMIN_NAME: ${TESSIO_ADMIN_NAME:-}
      TESSIO_SITE_ADDRESS: ${TESSIO_SITE_ADDRESS:-:80}
      # Edition + license (paid editions only; community needs none of these).
      TESSIO_EDITION: ${TESSIO_EDITION:-community}
      TESSIO_LICENSE_KEY: ${TESSIO_LICENSE_KEY:-}
      TESSIO_LICENSE_SERVER_URL: ${TESSIO_LICENSE_SERVER_URL:-}
      EMAIL_POLL_INTERVAL_MS: ${EMAIL_POLL_INTERVAL_MS:-60000}
      SCHEDULE_TICK_INTERVAL_MS: ${SCHEDULE_TICK_INTERVAL_MS:-60000}
      SLA_TICK_INTERVAL_MS: ${SLA_TICK_INTERVAL_MS:-60000}
      EMAIL_ATTACHMENT_MAX_BYTES: ${EMAIL_ATTACHMENT_MAX_BYTES:-10485760}
      TESSIO_SITE_URL: ${TESSIO_SITE_URL:-http://localhost}
    ports:
      - '${TESSIO_HTTP_PORT:-80}:80'
    volumes:
      - tessio_aio_data:/data
    depends_on:
      # required:false → when the "bundled" profile is off (managed datastores),
      # these services don't exist and the app starts without them.
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

volumes:
  tessio_aio_pg:
  tessio_aio_data:
