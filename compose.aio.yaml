name: tessio-aio

# The all-in-one app container + its two external datastores. Simplest Tessio:
# one app container (api+worker+runner+web+migrations) talking to Postgres + Redis.
# Build locally with `docker compose -f compose.aio.yaml up -d --build` until images
# are published; then `docker compose -f compose.aio.yaml up -d` pulls
# ghcr.io/tessio-ai/tessio-aio.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: tessio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tessio}
      POSTGRES_DB: tessio
    volumes:
      - tessio_aio_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tessio']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:-}']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/tessio-ai/tessio-aio:${TESSIO_VERSION:-latest}
    build:
      context: .
      target: aio
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://tessio:tessio@postgres:5432/tessio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SESSION_SECRET: ${SESSION_SECRET}
      TESSIO_SECRET_KEY: ${TESSIO_SECRET_KEY}
      # Worker + runner share this container; the token locks the internal /run endpoint.
      RUNNER_TOKEN: ${RUNNER_TOKEN:-}
      TESSIO_ADMIN_EMAIL: ${TESSIO_ADMIN_EMAIL:-}
      TESSIO_ADMIN_PASSWORD: ${TESSIO_ADMIN_PASSWORD:-}
      TESSIO_ADMIN_NAME: ${TESSIO_ADMIN_NAME:-}
      TESSIO_SITE_ADDRESS: ${TESSIO_SITE_ADDRESS:-:80}
      EMAIL_POLL_INTERVAL_MS: ${EMAIL_POLL_INTERVAL_MS:-60000}
      SCHEDULE_TICK_INTERVAL_MS: ${SCHEDULE_TICK_INTERVAL_MS:-60000}
      SLA_TICK_INTERVAL_MS: ${SLA_TICK_INTERVAL_MS:-60000}
      EMAIL_ATTACHMENT_MAX_BYTES: ${EMAIL_ATTACHMENT_MAX_BYTES:-10485760}
      TESSIO_SITE_URL: ${TESSIO_SITE_URL:-http://localhost}
    ports:
      - '${TESSIO_HTTP_PORT:-80}:80'
    volumes:
      - tessio_aio_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  tessio_aio_pg:
  tessio_aio_data:
