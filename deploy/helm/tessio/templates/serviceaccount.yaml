{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tessio.serviceAccountName" . }}
  labels: {{- include "tessio.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tessio.fullname" . }}-job-reader
  labels: {{- include "tessio.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tessio.fullname" . }}-job-reader
  labels: {{- include "tessio.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "tessio.fullname" . }}-job-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "tessio.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
