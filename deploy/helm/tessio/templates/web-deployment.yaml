apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tessio.fullname" . }}-web
  labels:
    {{- include "tessio.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels: {{- include "tessio.componentSelectorLabels" (dict "ctx" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "tessio.componentSelectorLabels" (dict "ctx" . "component" "web") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: {{ include "tessio.image" (dict "ctx" . "component" "web") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: TESSIO_SITE_ADDRESS
              value: {{ .Values.config.siteAddress | quote }}
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
      volumes:
        - name: caddyfile
          configMap:
            name: {{ include "tessio.fullname" . }}-caddy
      {{- with .Values.web.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
