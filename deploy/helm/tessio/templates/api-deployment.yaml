apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tessio.fullname" . }}-api
  labels:
    {{- include "tessio.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels: {{- include "tessio.componentSelectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "tessio.componentSelectorLabels" (dict "ctx" . "component" "api") | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tessio.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-migrate
          image: bitnami/kubectl:1.31
          command:
            - sh
            - -c
            - |
              until kubectl get job/{{ include "tessio.migrateJobName" . }} >/dev/null 2>&1; do
                echo "waiting for migrate job to be created..."; sleep 2;
              done
              kubectl wait --for=condition=complete --timeout=600s job/{{ include "tessio.migrateJobName" . }}
      containers:
        - name: api
          image: {{ include "tessio.image" (dict "ctx" . "component" "api") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.api.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "tessio.fullname" . }}-config
          env:
            - name: PORT
              value: "3000"
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: {{ include "tessio.postgres.fullname" . }}, key: POSTGRES_PASSWORD }
            {{- end }}
            - name: DATABASE_URL
              value: {{ include "tessio.databaseUrl" . | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef: { name: {{ include "tessio.secretName" . }}, key: SESSION_SECRET }
            - name: TESSIO_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "tessio.secretName" . }}, key: TESSIO_SECRET_KEY }
            - name: TESSIO_LICENSE_KEY
              valueFrom:
                secretKeyRef: { name: {{ include "tessio.secretName" . }}, key: TESSIO_LICENSE_KEY, optional: true }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /data/storage
      volumes:
        - name: storage
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "tessio.fullname" . }}-storage
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
