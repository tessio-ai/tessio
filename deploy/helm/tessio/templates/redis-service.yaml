{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tessio.redis.fullname" . }}
  labels: {{- include "tessio.labels" . | nindent 4 }}
spec:
  selector: {{- include "tessio.componentSelectorLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
{{- end }}
