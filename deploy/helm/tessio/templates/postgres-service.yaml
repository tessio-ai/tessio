{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tessio.postgres.fullname" . }}
  labels: {{- include "tessio.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector: {{- include "tessio.componentSelectorLabels" (dict "ctx" . "component" "postgresql") | nindent 4 }}
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
{{- end }}
