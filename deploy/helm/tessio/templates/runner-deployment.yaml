apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tessio.fullname" . }}-runner
  labels:
    {{- include "tessio.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  replicas: {{ .Values.runner.replicaCount }}
  selector:
    matchLabels: {{- include "tessio.componentSelectorLabels" (dict "ctx" . "component" "runner") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "tessio.componentSelectorLabels" (dict "ctx" . "component" "runner") | nindent 8 }}
    spec:
      securityContext: {{- toYaml .Values.runner.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runner
          image: {{ include "tessio.image" (dict "ctx" . "component" "runner") | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.runner.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3100
          env:
            - name: NODE_ENV
              value: "production"
            - name: RUNNER_PORT
              value: "3100"
            - name: HOST
              value: "0.0.0.0"
            # Locks /run to callers presenting this token (the worker). Without it,
            # /run executes sandboxed scripts for anyone who can reach the pod.
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef: { name: {{ include "tessio.secretName" . }}, key: RUNNER_TOKEN }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.runner.resources | nindent 12 }}
      {{- with .Values.runner.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runner.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runner.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
