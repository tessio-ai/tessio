suite: app secret
templates:
  - templates/secret.yaml
tests:
  - it: generates secrets when none provided
    asserts:
      - isKind: { of: Secret }
      - exists: { path: stringData.SESSION_SECRET }
      - exists: { path: stringData.TESSIO_SECRET_KEY }
      - exists: { path: stringData.RUNNER_TOKEN }
  - it: respects provided values
    set:
      secrets.sessionSecret: my-session
      secrets.secretKey: my-key
      secrets.runnerToken: my-runner-token
    asserts:
      - equal: { path: stringData.SESSION_SECRET, value: my-session }
      - equal: { path: stringData.TESSIO_SECRET_KEY, value: my-key }
      - equal: { path: stringData.RUNNER_TOKEN, value: my-runner-token }
  - it: includes admin creds only when both set
    set:
      admin.email: a@b.io
      admin.password: pw
    asserts:
      - equal: { path: stringData.TESSIO_ADMIN_EMAIL, value: a@b.io }
  - it: renders nothing when existingSecret is set
    set:
      secrets.existingSecret: my-existing
    asserts:
      - hasDocuments: { count: 0 }
